<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Licença liberada | WorkMind PSI</title>

  <style>
    :root {
      --slate-950: #020617;
      --slate-900: #0f172a;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50: #f8fafc;
      --white: #ffffff;
      --indigo: #4f46e5;
      --violet: #7c3aed;
      --emerald: #059669;
      --red: #dc2626;
      --shadow: 0 34px 100px rgba(2, 6, 23, .38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--slate-900);
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, .35), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 58, 237, .22), transparent 32%),
        linear-gradient(135deg, #020617 0%, #111827 46%, #312e81 100%);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .card {
      width: min(860px, 100%);
      background: rgba(255,255,255,.97);
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 34px;
      padding: 34px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
    }

    .badge {
      display: inline-flex;
      padding: 8px 13px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1;
      letter-spacing: -.06em;
      color: var(--slate-950);
    }

    p {
      color: var(--slate-600);
      line-height: 1.7;
      font-size: 16px;
    }

    .status {
      margin-top: 22px;
      padding: 18px;
      border-radius: 22px;
      background: var(--slate-50);
      border: 1px solid var(--slate-200);
      color: var(--slate-700);
      font-weight: 800;
      line-height: 1.6;
    }

    .license-box {
      display: none;
      margin-top: 22px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      border: 1px solid var(--slate-200);
      background: #f8fafc;
      border-radius: 18px;
      padding: 16px;
      color: var(--slate-900);
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .meta div {
      padding: 13px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid var(--slate-200);
      color: var(--slate-600);
      font-size: 13px;
      font-weight: 800;
    }

    .meta strong {
      display: block;
      color: var(--slate-950);
      margin-top: 4px;
      word-break: break-word;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 18px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      font-weight: 900;
      line-height: 1.2;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      color: white;
      box-shadow: 0 18px 42px rgba(79, 70, 229, .35);
    }

    .btn-outline {
      background: #ffffff;
      color: var(--slate-800);
      border: 1px solid var(--slate-200);
    }

    .error {
      color: var(--red);
    }

    .success {
      color: var(--emerald);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 24px;
        border-radius: 28px;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">WorkMind PSI</div>

    <h1>Finalização da licença</h1>

    <p>
      Estamos conferindo a confirmação do pagamento no Mercado Pago. Se estiver aprovado, sua licença aparecerá abaixo.
    </p>

    <div class="status" id="status-box">
      Consultando pagamento...
    </div>

    <section class="license-box" id="license-box">
      <h2>Sua licença foi liberada</h2>

      <textarea id="license-text" readonly></textarea>

      <div class="meta">
        <div>
          E-mail de ativação
          <strong id="license-email">-</strong>
        </div>

        <div>
          Validade
          <strong id="license-expire">-</strong>
        </div>

        <div>
          Tipo
          <strong id="license-type">-</strong>
        </div>

        <div>
          HWID vinculado
          <strong id="license-hwid">-</strong>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="button" id="copy-license">Copiar licença</button>
        <a class="btn btn-outline" href="index.html#download">Baixar WorkMind PSI</a>
        <a class="btn btn-outline" href="index.html#suporte">Preciso de suporte</a>
      </div>
    </section>
  </main>

  <script>
    const WORKMIND_LICENSE_API = "https://workmind-license-api.vercel.app";

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function formatDateBR(value) {
      if (!value) return "-";

      try {
        return new Date(value).toLocaleDateString("pt-BR");
      } catch (e) {
        return value;
      }
    }

    function setStatus(message, type) {
      const box = document.getElementById("status-box");
      box.textContent = message;
      box.classList.remove("success", "error");

      if (type) {
        box.classList.add(type);
      }
    }

    async function loadLicense() {
      const paymentId =
        getParam("payment_id") ||
        getParam("collection_id") ||
        getParam("id");

      if (!paymentId) {
        setStatus("Não encontramos o código do pagamento na URL. Se você já pagou, entre em contato com o suporte informando o comprovante.", "error");
        return;
      }

      try {
        const response = await fetch(WORKMIND_LICENSE_API + "/api/license?payment_id=" + encodeURIComponent(paymentId));
        const data = await response.json();

        if (!response.ok || !data.success) {
          console.error("Erro ao gerar licença:", data);
          setStatus(data.error || "Pagamento não aprovado ainda. Aguarde alguns minutos e atualize esta página.", "error");
          return;
        }

        document.getElementById("license-box").style.display = "block";
        document.getElementById("license-text").value = data.license;
        document.getElementById("license-email").textContent = data.email || "-";
        document.getElementById("license-expire").textContent = formatDateBR(data.expire);
        document.getElementById("license-type").textContent = data.type || "-";
        document.getElementById("license-hwid").textContent = data.hwid || "-";

        setStatus("Pagamento aprovado. Sua licença foi gerada com sucesso.", "success");
      } catch (err) {
        console.error("Erro ao consultar licença:", err);
        setStatus("Não foi possível consultar sua licença agora. Tente atualizar esta página em alguns minutos.", "error");
      }
    }

    const copyButton = document.getElementById("copy-license");

    if (copyButton) {
      copyButton.addEventListener("click", async function () {
        const text = document.getElementById("license-text").value;

        try {
          await navigator.clipboard.writeText(text);
          copyButton.textContent = "Licença copiada";
          setTimeout(function () {
            copyButton.textContent = "Copiar licença";
          }, 1800);
        } catch (e) {
          document.getElementById("license-text").select();
          alert("Selecione e copie a licença manualmente.");
        }
      });
    }

    loadLicense();
  </script>
</body>
</html>
